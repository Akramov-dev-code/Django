<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Abdulloh | Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Inter', sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color:white;
        }

        .card{
            background: rgba(255,255,255,0.08);
            padding:60px;
            border-radius:25px;
            backdrop-filter: blur(15px);
            text-align:center;
            width:90%;
            max-width:700px;
            box-shadow:0 0 40px rgba(0,0,0,0.4);
        }

        .profile-img{
            width:140px;
            height:140px;
            border-radius:50%;
            object-fit:cover;
            border:4px solid #38bdf8;
            margin-bottom:20px;
        }

        h1{
            font-size:40px;
            margin-bottom:10px;
        }

        h1 span{
            color:#38bdf8;
        }

        p{
            color:#d1d5db;
            margin-bottom:30px;
        }

        .buttons a{
            text-decoration:none;
            padding:12px 25px;
            margin:0 10px;
            border-radius:30px;
            font-weight:600;
            transition:0.3s;
        }

        .btn-primary{
            background:#38bdf8;
            color:black;
        }

        .btn-primary:hover{
            background:white;
        }

        .btn-outline{
            border:2px solid #38bdf8;
            color:#38bdf8;
        }

        .btn-outline:hover{
            background:#38bdf8;
            color:black;
        }

        .socials{
            margin-top:30px;
        }

        .socials a{
            margin:0 10px;
            font-size:20px;
            text-decoration:none;
            color:white;
            transition:0.3s;
        }

        .socials a:hover{
            color:#38bdf8;
        }

        @media(max-width:600px){
            .card{
                padding:40px 20px;
            }
            h1{
                font-size:28px;
            }
        }

    </style>
</head>
<body>

<div class="card">
    <img src="https://via.placeholder.com/150" alt="Profile" class="profile-img">

    <h1>Hi, I'm <span>Abdulloh</span></h1>
    <p>
        Django Backend Developer & Flutter App Creator.  
        I build clean, scalable and professional applications.
    </p>

    <div class="buttons">
        <a href="#" class="btn-primary">My Projects</a>
        <a href="#" class="btn-outline">Contact Me</a>
    </div>

    <div class="socials">
        <a href="#">🌐</a>
        <a href="#">💻</a>
        <a href="#">📱</a>
    </div>
</div>

</body>
</html>
